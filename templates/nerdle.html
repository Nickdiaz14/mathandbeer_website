<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="google-site-verification" content="prMhJRzxbzY-OPF8pAc3w72jFMuNqcPC9nxMkH_9rQU" />
    <meta name="viewport"
        content="width=device-width, initial-scale=0.7, minimum-scale=0.7, maximum-scale=0.7, height=device-height, user-scalable=no">
    <link rel="stylesheet" href="../static/css/main.css">
    <link rel="stylesheet" href="../static/css/games.css">
    <link rel="stylesheet" href="../static/css/0h_h1.css">
    <link rel="stylesheet" href="../static/css/nerdle.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer">
    <link rel="icon" type="image/png" href="../static/images/logos/favicon.png">
    <title>0h-h1 | Math and Beer</title>
    <meta name="description" content="Juega 0h-h1 y compite con tus amigos">
    <meta name="robots" content="noindex">
</head>

<body data-n="{{ n }}">
    <header>
        <nav class="navbar navbar-expand-lg menu">
            <div class="container-fluid">
                <button onclick="window.location.href='/'" class="navbar-brand">
                    <div class="logo"></div>
                </button>
                <button class="navbar-toggler menuHamb" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarNavDropdown" aria-controls="navbarNavDropdown" aria-expanded="false"
                    aria-label="Toggle navigation">
                    <i class="fa-solid fa-bars fa-2xl" style="color: #b6bde7;"></i>
                </button>
                <div class="collapse navbar-collapse" id="navbarNavDropdown">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a href="/profile" class="nav-link active" aria-current="page"><i
                                    class="fa-solid fa-user"></i> Mi Perfil</a>
                        </li>
                        <li class="nav-item">
                            <a href="/menu_games" class="nav-link active" aria-current="page"><i
                                    class="fa-solid fa-gamepad"></i> Juegos</a>
                        </li>
                        <li class="nav-item">
                            <a href="/leaderboards" class="nav-link active" aria-current="page"><i
                                    class="fa-solid fa-ranking-star"></i> Rankings</a>
                        </li>
                        <li class="nav-item">
                            <a href="/" class="nav-link active" aria-current="page"><i
                                    class="fa-solid fa-people-group"></i> Sobre Nosotros</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <div id="countdown-overlay"></div>
        <h1 id="title" class="title first-row">Nerdle</h1>
        <h2 id="subtitle" class="title fs-5">¡Adivina la ecuación!</h2>
        <h2 id="timer" class="title fs-6">00:00.00</h2>
        <div id="matrix-wrapper">
            <table id="matrix">
                <!-- Aquí js pone la matriz de juego-->
            </table>
        </div>
        <table id="inputs">
            <!-- JavaScript will generate the inputs table here -->
        </table>
        <button id="back" class="back"><i class="fa-solid fa-house"></i></i></button>
        <button id="recharge" class="recharge"><i class="fa-solid fa-rotate-left"></i></button>
        <button class="game_info" data-bs-toggle="modal" data-bs-target="#modal-reglas"><i
                class="fa-solid fa-info"></i></button>

        <!-- Modal -->
        <div class="modal fade" id="modal-reglas" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-xl modal-dialog-centered">
                <div class="modal-content bg-dark text-light overflow-auto">
                    <div class="modal-header displayColumn title fs-3">0h-h1</div>
                    <div class="modal-body">
                        <p class="modalContent">{{ c.summary }}</p>
                        <h3>Reglas:</h3>
                        <ul>
                            {% for ndx, rule in c.rules.items() %}
                            <li class="modalContent">{{ rule }}</li>
                            {% endfor %}
                        </ul>
                    </div>

                    <div class="modal-footer myButtons">
                        <button type="button" class="btn btn-secondary"
                            onclick="window.location.reload()">Cerrar</button>
                        <button type="button" class="btn btn-secondary"
                            onclick="window.location.href='/tutorial_0h_h1'">Tutorial</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="../static/scripts/utils.js"></script>
    <script src="../static/scripts/main.js"></script>
    <script src="../static/scripts/game_info.js"></script>
    <script src="../static/scripts/nerdle.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
