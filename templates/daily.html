    <title>Reto Diario | Math & Beer</title>
    <meta name="description" content="Reto diario de Math & Beer. ¡Compite cada día con un nuevo desafío matemático!">
    <meta name="robots" content="noindex, nofollow">
</head>

<body>
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-WXZ6G9P3"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->
    <header>
        <nav class="navbar navbar-expand-lg menu">
            <div class="container-fluid">
                <button onclick="window.location.href='/'" class="navbar-brand">
                    <div class="logo"></div>
                </button>
                <button class="navbar-toggler menuHamb" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarNavDropdown" aria-controls="navbarNavDropdown" aria-expanded="false"
                    aria-label="Toggle navigation">
                    <i class="fa-solid fa-bars fa-2xl" style="color: #b6bde7;"></i>
                </button>
                <div class="collapse navbar-collapse" id="navbarNavDropdown">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a href="/profile" class="nav-link active" aria-current="page"><i
                                    class="fa-solid fa-user"></i> Mi Perfil</a>
                        </li>
                        <li class="nav-item">
                            <a href="/menu_games" class="nav-link active" aria-current="page"><i
                                    class="fa-solid fa-gamepad"></i> Juegos</a>
                        </li>
                        <li class="nav-item">
                            <a href="/daily" class="nav-link active" aria-current="page" id="nav-active"><i
                                    class="fa-solid fa-crosshairs"></i> Reto Diario</a>
                        </li>
                        <li class="nav-item">
                            <a href="/leaderboards" class="nav-link active" aria-current="page"><i
                                    class="fa-solid fa-ranking-star"></i> Rankings</a>
                        </li>
                        <li class="nav-item">
                            <a href="/" class="nav-link active" aria-current="page"><i
                                    class="fa-solid fa-people-group"></i> Sobre Nosotros</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <!-- Loading: skeleton -->
        <div id="daily-loading" class="daily-loading">
            <div class="daily-game-card skel-daily-card">
                <div class="skel-daily-date skeleton"></div>
                <div class="skel-daily-title skeleton"></div>
                <div class="skel-daily-badge skeleton"></div>
                <div class="daily-streak-row">
                    <div class="daily-streak-card rounded-4 skel-daily-streak skeleton"></div>
                    <div class="daily-streak-card rounded-4 skel-daily-streak skeleton"></div>
                </div>
                <div class="skel-daily-btn skeleton"></div>
            </div>
            <div class="daily-leaderboard-card skel-daily-lb-card">
                <div class="skel-daily-lb-title skeleton"></div>
                <div class="skel-daily-lb-row skeleton"></div>
                <div class="skel-daily-lb-row skeleton"></div>
                <div class="skel-daily-lb-row skeleton"></div>
                <div class="skel-daily-lb-row skeleton"></div>
                <div class="skel-daily-lb-row skeleton"></div>
            </div>
        </div>

        <!-- Content -->
        <div id="daily-content" style="display:none;" class="w-100 displayColumn">

            <!-- Game Info -->
            <div class="daily-game-card rounded-4 p-4 shadow-sm">
                <p class="daily-date" id="daily-date"></p>
                <h1 class="title fs-2">Reto Diario</h1>
                <div class="daily-game-badge" id="daily-game-badge">
                    <i class="fa-solid fa-dice me-2"></i>
                    <span id="daily-game-name">Cargando...</span>
                </div>
                <!-- Streak -->
                <div class="daily-streak-row">
                    <div class="daily-streak-card">
                        <span class="streak-fire" id="streak-icon">🔥</span>
                        <div class="streak-info">
                            <span class="streak-number" id="streak-current">0</span>
                            <span class="streak-label">Racha</span>
                        </div>
                    </div>
                    <div class="daily-streak-card rounded-4 p-3 shadow-sm">
                        <span class="streak-fire">🏆</span>
                        <div class="streak-info">
                            <span class="streak-number" id="streak-best">0</span>
                            <span class="streak-label">Mejor</span>
                        </div>
                    </div>
                </div>

                <!-- Play button (shown when not played) -->
                <button id="daily-play-btn" class="daily-play-btn" style="display:none;">
                    <i class="fa-solid fa-play me-2"></i>¡Jugar!
                </button>

                <!-- Already played (shown when played) -->
                <div id="daily-result" class="daily-result" style="display:none;">
                    <p class="daily-result-label">Tu resultado</p>
                    <p class="daily-result-value" id="daily-result-value"></p>
                </div>
            </div>

            <!-- Leaderboard -->
            <hr style="margin: 5px 0px 15px;">
            <p class="record_count" style="margin-bottom: 15px;">Hay <span id="daily-count">0</span> registros hoy</p>
            <div id="daily-leaderboard" class="leaderboard displayColumn myBg myBorder">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Jugador</th>
                            <th>Record</th>
                            <th>Racha</th>
                        </tr>
                    </thead>
                    <tbody id="daily-ranking">
                        <!-- Leaderboard rows will be dynamically inserted here -->
                    </tbody>
                </table>
            </div>

            <div id="extra_leaderboard" class="leaderboard displayColumn myBg myBorder" style="display: none;">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Jugador</th>
                            <th>Record</th>
                            <th>Racha</th>
                        </tr>
                    </thead>
                    <tbody id="extra_ranking">
                        <!-- Leaderboard rows will be dynamically inserted here -->
                    </tbody>
                </table>
            </div>

            <!-- Share -->
            <div class="share-row" id="daily-share" style="display:none;">
                <button id="daily-share-wa" class="share-btn share-wa">
                    <i class="fa-brands fa-whatsapp"></i> WhatsApp
                </button>
                <button id="daily-share-copy" class="share-btn share-copy">
                    <i class="fa-solid fa-copy"></i> Copiar
                </button>
            </div>
        </div>
    </main>


    <script src="../static/scripts/utils.js"></script>
    <script src="../static/scripts/main.js"></script>
    <script src="../static/scripts/daily.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
