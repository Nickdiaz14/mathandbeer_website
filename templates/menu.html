    <div id="loading" class="loading">

            <div class="game skeleton-game"></div>
            <div class="game skeleton-game"></div>

    <main id="no-loading" style="display:none;">
        <hr>
        <h1 class="title">¡Hola, {{ nickname }}! <br> Elige un juego</h1>
        <hr>
        <div class="grid_container menu_games">
            <button class="game" data-bs-toggle="modal" data-bs-target="#0h-h1-size">
                <span class="game_text_out">¡Jugar!</span>
                <img src="../static/images/games/0h-h1.png" alt="" class="game_img" loading="lazy">
                <span class="game_text">0h-h1</span>
            </button>

            <button class="game" onclick="window.location.href='/0h_h1_tt'">
                <span class="game_text_out">¡Jugar!</span>
                <img src="../static/images/games/0h-h1_tt.png" alt="" class="game_img" loading="lazy">
                <span class="game_text">Contrarreloj</span>
            </button>

            <button class="game" onclick="window.location.href='/knight'">
                <span class="game_text_out">¡Jugar!</span>
                <img src="../static/images/games/knight.png" alt="" class="game_img" loading="lazy">
                <span class="game_text">Salto Real</span>
            </button>

            <button class="game" data-bs-toggle="modal" data-bs-target="#secuenzo-size">
                <span class="game_text_out">¡Jugar!</span>
                <img src="../static/images/games/0h-h1.png" alt="" class="game_img" loading="lazy">
                <span class="game_text">Secuenzo</span>
            </button>

            <button class="game" data-bs-toggle="modal" data-bs-target="#cuentamania-size">
                <span class="game_text_out">¡Jugar!</span>
                <img src="../static/images/games/cuentamania.png" alt="" class="game_img" loading="lazy">
                <span class="game_text">CuentaManía</span>
            </button>

            <button class="game" data-bs-toggle="modal" data-bs-target="#0h-n0-size">
                <span class="game_text_out">¡Jugar!</span>
                <img src="../static/images/games/0h-n0.png" alt="" class="game_img" loading="lazy">
                <span class="game_text">0h-n0</span>
            </button>

            <button class="game" data-bs-toggle="modal" data-bs-target="#nerdle-size">
                <span class="game_text_out">¡Jugar!</span>
                <img src="../static/images/games/nerdle.png" alt="" class="game_img" loading="lazy">
                <span class="game_text">Nerdle</span>
            </button>
        </div>

        <!-- Modal 0h-h1 -->
        <div class="modal fade" id="0h-h1-size" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content size-modal-content">
                    <p class="size-modal-title">Elige el tamaño</p>
                    <div class="size-modal-btns">
                        <button class="size-modal-btn" onclick="window.location.href='/0h_h1?n=4'">4×4</button>
                        <button class="size-modal-btn" onclick="window.location.href='/0h_h1?n=6'">6×6</button>
                        <button class="size-modal-btn" onclick="window.location.href='/0h_h1?n=8'">8×8</button>
                        <button class="size-modal-btn" onclick="window.location.href='/0h_h1?n=10'">10×10</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Modal Secuenzo -->
        <div class="modal fade" id="secuenzo-size" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content size-modal-content">
                    <p class="size-modal-title">Elige el modo</p>
                    <div class="size-modal-btns">
                        <button class="size-modal-btn" onclick="window.location.href='/secuenzo?n=6'">Unicolor<br><small>6×6</small></button>
                        <button class="size-modal-btn" onclick="window.location.href='/secuenzo?n=5'">Bicolor<br><small>5×5</small></button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Modal CuentaManía -->
        <div class="modal fade" id="cuentamania-size" tabindex="-1" aria-hidden="true">

                <div class="modal-content size-modal-content">

                    <div class="size-modal-btns">
                        <button class="size-modal-btn" onclick="window.location.href='/cuentamania?n=3'">S<br><small>3×3</small></button>
                        <button class="size-modal-btn" onclick="window.location.href='/cuentamania?n=4'">M<br><small>4×4</small></button>
                        <button class="size-modal-btn" onclick="window.location.href='/cuentamania?n=5'">L<br><small>5×5</small></button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Modal 0h-n0 -->

                    </div>
                </div>
            </div>
        </div>

        <!-- Modal Nerdle -->
        <div class="modal fade" id="nerdle-size" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content size-modal-content">
                    <p class="size-modal-title">Elige el modo</p>
                    <div class="size-modal-btns">
                        <button class="size-modal-btn" onclick="window.location.href='/nerdle?n=6'">Mini<br><small>6 dígitos</small></button>
                        <button class="size-modal-btn" onclick="window.location.href='/nerdle?n=8'">Estándar<br><small>8 dígitos</small></button>
                        <button class="size-modal-btn" onclick="window.location.href='/nerdle?n=10'">Maxi<br><small>10 dígitos</small></button>
                    </div>
                </div>
            </div>
