        <!-- <div id="countdown-overlay">
            <h2 class="fs-3">Próximamente disponible 🚧 <br>¡Vuelve pronto!</h2>
        </div> -->
        <h1 class="title first-row">¡Elige un juego!</h1>
        <select name="select" id="select" class="game_select" onchange="updateLeaderboard()">
            <option value="T4">0h-h1 - 4</option>
            <option value="T6">0h-h1 - 6</option>
            <option value="T8">0h-h1 - 8</option>
            <option value="T10">0h-h1 - 10</option>
            <option value="TContrareloj">Contrareloj</option>
            <option value="TKnight">Salto Real</option>
            <option value="TUnicolor">Unicolor</option>
            <option value="TBicolor">Bicolor</option>
            <option value="TS3">CuentaManía - S</option>
            <option value="TS4">CuentaManía - M</option>
            <option value="TS5">CuentaManía - L</option>
            <option value="T04">0h-n0 - 4</option>
            <option value="T05">0h-n0 - 5</option>
            <!-- <option value="patron_perfecto">Patrón Perfecto</option>
            <option value="colores_cruzados">Colores Cruzados</option>
            <option value="nerdle">Nerdle</option> -->
        </select>
        <p class="record_count">Hay <span id="count_records"></span> registros</p>
        <hr>
        <div id="leaderboard" class="leaderboard displayColumn myBg myBorder">
            <table>
                <thead>
                    <tr>
                        <th>Posición</th>
                        <th>Jugador</th>
                        <th>Record</th>
                    </tr>
                </thead>
                <tbody id="ranking">
                    <!-- Leaderboard rows will be dynamically inserted here -->
                </tbody>
            </table>
        </div>
        
        <div id="extra_leaderboard" class="leaderboard displayColumn myBg myBorder" style="display: none;">
            <table>
                <thead>
                    <tr>
                        <th>Posición</th>
                        <th>Jugador</th>
                        <th>Record</th>
                    </tr>

                </tbody>
