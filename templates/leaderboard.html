<body data-game="{{ game }}" data-records="{{ records }}" data-better="{{ better }}">

                <button class="navbar-toggler menuHamb" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarNavDropdown" aria-controls="navbarNavDropdown" aria-expanded="false"

                <div class="collapse navbar-collapse" id="navbarNavDropdown">
                    <ul class="navbar-nav">

    <main>
        <h1 class="title first-row">{{ name }}</h1>
        <h1 class="title fs-6">{{ message }}</h1>
        <hr>
        <div id="leaderboard" class="leaderboard displayColumn myBg myBorder">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Jugador</th>
                        <th>Record</th>
                    </tr>
                </thead>
                <tbody id="ranking">
                    <!-- Leaderboard rows will be dynamically inserted here -->
                </tbody>
            </table>
        </div>

        <div id="extra_leaderboard" class="leaderboard displayColumn myBg myBorder" style="display: none;">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Jugador</th>
                        <th>Record</th>
                    </tr>
                </thead>
                <tbody id="extra_ranking">
                    <!-- Leaderboard rows will be dynamically inserted here -->
                </tbody>
            </table>
        </div>
        <button id="back" class="back"><i class="fa-solid fa-arrow-left"></i></button>
        <button id="game_info" class="recharge"><i class="fa-solid fa-rotate-left"></i></button>

        <!-- Share buttons -->
        <div class="share-row" id="share-row">
            <a id="share-wa" class="share-btn share-wa" href="#" target="_blank" rel="noopener">
                <i class="fa-brands fa-whatsapp"></i> WhatsApp
            </a>
            <a id="share-x" class="share-btn share-x" href="#" target="_blank" rel="noopener">
                <i class="fa-brands fa-x-twitter"></i> X
            </a>
            <button id="share-copy" class="share-btn share-copy">
                <i class="fa-solid fa-copy"></i> Copiar
            </button>
        </div>
    </main>

    <!-- fireworks -->
    <div id="fireworks-layer" style="display: none;">
        <div class="firework"></div>
        <div class="firework"></div>
        <div class="firework"></div>
        <div class="firework"></div>
        <div class="firework"></div>
        <div class="firework"></div>
    </div>

    <script src="../static/scripts/utils.js"></script>
    <script src="../static/scripts/main.js"></script>
    <script src="../static/scripts/leaderboards.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const game = document.body.dataset.game || 'un juego';
            const msg = document.querySelector('.title.fs-6')?.textContent || '';
            const siteUrl = window.location.origin;

            let cleanMsg = msg.replace(', sigue así!', '').replace('!', '').replace('¡Hiciste ', 'Hice ');
            if (cleanMsg.includes('Felicidades')) cleanMsg = '¡Conseguí un nuevo récord';

            const shareText = `🧠🍺 ${cleanMsg} en ${getGameName(game)} de Math & Beer! ¿Puedes superarme? ${siteUrl}/register`;

            const waBtn = document.getElementById('share-wa');
            const xBtn = document.getElementById('share-x');
            const copyBtn = document.getElementById('share-copy');

            if (waBtn) waBtn.href = `https://wa.me/?text=${encodeURIComponent(shareText)}`;
            if (xBtn) xBtn.href = `https://twitter.com/intent/tweet?text=${encodeURIComponent(shareText)}`;
            if (copyBtn) {
                copyBtn.addEventListener('click', async () => {
                    try {
                        await navigator.clipboard.writeText(shareText);
                        copyBtn.innerHTML = '<i class="fa-solid fa-check"></i> ¡Copiado!';
                        setTimeout(() => copyBtn.innerHTML = '<i class="fa-solid fa-copy"></i> Copiar', 2000);
                    } catch { /* silencioso */ }
                });
            }
        });

        function getGameName(gameCode) {
            switch (gameCode) {
                case "T4": return "0h-h1 - 4";
                case "T6": return "0h-h1 - 6";
                case "T8": return "0h-h1 - 8";
                case "T10": return "0h-h1 - 10";
                case "TContrareloj": return "Contrareloj";
                case "TKnight": return "Salto Real";
                case "TUnicolor": return "Unicolor";
                case "TBicolor": return "Bicolor";
                case "TS3": return "CuentaManía - S";
                case "TS4": return "CuentaManía - M";
                case "TS5": return "CuentaManía - L";
                default: return gameCode.replace('T', ''); // Fallback por si no coincide
            }
        }
    </script>
</body>

</html>
